name: Monitor de Vagas Diário

on:
  schedule:
    - cron: '0 11 * * *' # Roda às 08:00 no horário de Brasília
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependências
        run: |
          pip install selenium requests webdriver-manager

      - name: Rodar Script de Monitoramento
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python Busca.py

      - name: Salvar progresso (Commit JSON)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # Atualizado para hashes.json para persistir o estado de cada site
          git add hashes.json
          git commit -m "Update job hashes [skip ci]" || echo "Sem mudanças para salvar"
          git push